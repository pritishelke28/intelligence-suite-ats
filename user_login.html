<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Candidate Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --neon: #00ff99;
      --bg-dark: #050505;
      --card-bg: #0b0b0b;
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at bottom left, #0d2b1f, var(--bg-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .login-wrapper {
      background: var(--card-bg);
      border-radius: 32px;
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border);
    }

    /* Left Aesthetic Panel */
    .left-panel {
      background: linear-gradient(135deg, var(--neon), #00cc7a);
      color: #000;
      padding: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-panel h1 {
      font-weight: 800;
      font-size: 3rem;
      letter-spacing: -2px;
      line-height: 1.1;
    }

    .left-panel p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-top: 25px;
      font-weight: 500;
      line-height: 1.6;
    }

    .register-link-box {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* Right Form Panel */
    .right-panel {
      padding: 70px;
      background: #0f0f0f;
    }

    .right-panel h3 {
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    .form-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--neon);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: white;
      border-radius: 16px;
      padding: 16px;
      transition: 0.3s;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--neon);
      color: white;
      box-shadow: 0 0 20px rgba(0, 255, 153, 0.1);
    }

    .btn-login {
      background: var(--neon);
      color: #000;
      border: none;
      font-weight: 800;
      padding: 16px;
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      margin-top: 10px;
    }

    .btn-login:hover {
      background: #fff;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 255, 153, 0.2);
    }

    .utility-link {
      color: #555;
      text-decoration: none;
      font-size: 0.85rem;
      transition: 0.3s;
      display: block;
      text-align: center;
      margin-top: 25px;
    }

    .utility-link:hover {
      color: var(--neon);
    }

    .alert {
      background: rgba(220, 53, 69, 0.1);
      border: 1px solid rgba(220, 53, 69, 0.2);
      color: #ff4b5c;
      border-radius: 15px;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { padding: 45px 30px; }
    }
  </style>
</head>

<body>

<div class="login-wrapper row g-0">

  <div class="col-md-6 left-panel">
    <h1>Welcome <br>Back. 👋</h1>
    <p>
      Ready for your next big move? Log in to manage your applications and discover roles tailored to your journey.
    </p>

    <div class="register-link-box">
      <span class="d-block mb-1 fw-bold">New to Careers.io?</span>
      <a href="/user-register" class="text-dark fw-bold text-decoration-none">
        Create your profile today &rarr;
      </a>
    </div>
  </div>

  <div class="col-md-6 right-panel">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h3>Sign In</h3>
      <a href="/" class="text-secondary text-decoration-none small">Close</a>
    </div>
    <p class="subtitle">Securely access your candidate dashboard.</p>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label">Security Key</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-login w-100">Access Dashboard</button>
    </form>

    <a href="/" class="utility-link">Return to Home Page</a>
  </div>

</div>

</body>
</html>
